# Config do cava usado pelo visualizador do Quickshell.
# Saída "raw" em ASCII no stdout: cada frame é uma linha "v;v;...;v"
# com valores inteiros de 0 a ascii_max_range.

[general]
bars = 64
framerate = 60
autosens = 1

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 1000
channels = mono
bar_delimiter = 59
frame_delimiter = 10
